name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Daily at 8 AM ART (= 11:00 UTC)
    - cron: '0 11 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh TVL data
        run: python scripts/refresh_tvl.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ranking.json
          git diff-index --quiet HEAD -- data/ranking.json && echo "NO_CHANGES" || git commit -m "chore: refresh TVL data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git diff-index --quiet HEAD -- data/ranking.json || git push

  build:
    needs: refresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4